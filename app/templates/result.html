<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Result — Elevator Status Detection</title>
    <meta name="description" content="View the AI-powered elevator status detection results.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="main">
        <!-- Header -->
        <header class="header">
            <div class="header__icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="2" width="18" height="20" rx="2"/>
                    <line x1="12" y1="6" x2="12" y2="10"/>
                    <polyline points="9 8 12 5 15 8"/>
                    <line x1="12" y1="14" x2="12" y2="18"/>
                    <polyline points="9 16 12 19 15 16"/>
                </svg>
            </div>
            <h1 class="header__title">Detection Result</h1>
            <p class="header__subtitle">AI analysis complete</p>
        </header>

        <!-- Result Card -->
        <div class="card">
            <div class="result-media">
                {% if media_type == 'image' %}
                    <img src="{{ url_for('static', filename=output_file) }}" alt="Processed Image — Elevator Status Detection">
                {% elif media_type == 'video' %}
                    <video controls autoplay muted>
                        <source src="{{ url_for('static', filename=output_file) }}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                {% endif %}
            </div>

            <div class="result-actions">
                <a href="/" class="btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    Upload Another
                </a>
                {% if media_type == 'image' %}
                <a href="{{ url_for('static', filename=output_file) }}" download class="btn btn--secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download
                </a>
                {% endif %}
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            Powered by <a href="https://docs.ultralytics.com/" target="_blank" rel="noopener">YOLOv8</a> &amp; Flask
        </footer>
    </main>
</body>
</html>
